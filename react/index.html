<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#183f2f" />
    <meta name="description" content="Veyro — free soccer, basketball, and football player match rating calculator. Track performance stats, save match history, and spot development trends." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Veyro | Soccer Player Rating Calculator" />
    <meta property="og:description" content="Rate soccer, basketball, and football player performances after every match. Free calculator with match vault and trend tracking." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://darksalmon-lark-983637.hostingersite.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Veyro | Soccer Player Rating Calculator" />
    <meta name="twitter:description" content="Rate soccer, basketball, and football player performances after every match." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Veyro" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />

    <!-- Preload critical fonts to fix LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebaseapp.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />

    <!-- Prevent CLS: reserve sidebar space before JS loads -->
    <style>
        /* Critical inline CSS — prevents layout shift before React hydrates */
        *, *::before, *::after { box-sizing: border-box; }
        html { overflow-x: hidden; }
        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(180deg, #f8fbf7 0%, #eef4ef 42%, #e7efe8 100%);
            padding: 28px 18px 36px;
            color: #163127;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        }
        @media (max-width: 700px) {
            body { padding-bottom: calc(132px + env(safe-area-inset-bottom)); }
        }
        /* Skeleton sidebar toggle — prevents CLS from sidebar appearing late */
        .sidebar-skeleton {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            left: max(12px, env(safe-area-inset-left));
            z-index: 1001;
            width: 88px;
            height: 40px;
            border-radius: 999px;
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(22,49,39,0.12);
        }
        #root { min-height: 100vh; }
    </style>

    <title>Veyro | Soccer Player Rating Calculator</title>
</head>
<body>
    <!-- Skeleton shown before React loads — eliminates sidebar CLS -->
    <div class="sidebar-skeleton" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
